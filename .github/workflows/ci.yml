name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test Varnish latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
        with: { key: "${{ matrix.ver }}" }
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - run: just install-varnish
      - run: just ci-test-latest

  test-varnish-ver:
    name: Test Varnish ${{ matrix.ver }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - ver: 9.0
          - ver: 8.0
    steps:
      - uses: actions/checkout@v4
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
        with: { key: "${{ matrix.ver }}" }
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - run: just install-varnish ${{ matrix.ver }}
      - name: Install fcgiwrap
        run: |
          sudo apt-get update
          sudo apt-get install -qqq fcgiwrap
      - run: just ci-test

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - name: Install Varnish and fcgiwrap
        run: brew install varnish fcgiwrap
      - run: just build
      - run: just test

  # This job checks if any of the previous jobs failed or were canceled.
  # This approach also allows some jobs to be skipped if they are not needed.
  ci-passed:
    needs: [test, test-varnish-ver, test-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
